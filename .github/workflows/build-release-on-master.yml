name: Build macOS Release DMG

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install cmake sdl2 make

      - name: Print toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          clang --version | head -n 2

      - name: Build
        run: make BUILD_DIR=pc/build-macos

      - name: Package release bundle
        run: |
          set -eu
          SHA_SHORT="${GITHUB_SHA::7}"
          PKG_DIR="dist/AnimalCrossing-macos-${SHA_SHORT}"
          APP_DIR="${PKG_DIR}/AnimalCrossing.app"
          APP_CONTENTS="${APP_DIR}/Contents"
          APP_MACOS="${APP_CONTENTS}/MacOS"
          APP_RESOURCES="${APP_CONTENTS}/Resources"
          APP_FRAMEWORKS="${APP_CONTENTS}/Frameworks"
          mkdir -p "${PKG_DIR}" "dist"
          mkdir -p "${APP_MACOS}" "${APP_RESOURCES}" "${APP_FRAMEWORKS}"

          cp "pc/build-macos/bin/AnimalCrossing" "${APP_MACOS}/AnimalCrossing"
          cp -R "pc/build-macos/bin/shaders" "${APP_MACOS}/shaders"
          cp -R "pc/build-macos/bin/shaders" "${APP_RESOURCES}/shaders"
          chmod +x "${APP_MACOS}/AnimalCrossing"

          SDL2_DYLIB="$(brew --prefix sdl2)/lib/libSDL2-2.0.0.dylib"
          cp "${SDL2_DYLIB}" "${APP_FRAMEWORKS}/"

          SDL2_LINK_PATH="$(otool -L "${APP_MACOS}/AnimalCrossing" | awk '/libSDL2-2\.0\.0\.dylib/{print $1; exit}')"
          if [ -z "${SDL2_LINK_PATH}" ]; then
            echo "failed to locate SDL2 linkage in AnimalCrossing binary" >&2
            exit 1
          fi

          install_name_tool -change "${SDL2_LINK_PATH}" "@executable_path/../Frameworks/libSDL2-2.0.0.dylib" "${APP_MACOS}/AnimalCrossing"
          install_name_tool -id "@executable_path/../Frameworks/libSDL2-2.0.0.dylib" "${APP_FRAMEWORKS}/libSDL2-2.0.0.dylib"
          codesign --force --deep --sign - "${APP_DIR}"

          cat > "${APP_CONTENTS}/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>AnimalCrossing</string>
            <key>CFBundleDisplayName</key>
            <string>Animal Crossing</string>
            <key>CFBundleIdentifier</key>
            <string>com.lambadalambda.acgcpcport</string>
            <key>CFBundleVersion</key>
            <string>${SHA_SHORT}</string>
            <key>CFBundleShortVersionString</key>
            <string>${SHA_SHORT}</string>
            <key>CFBundleExecutable</key>
            <string>AnimalCrossing</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF

          cat > "${PKG_DIR}/README.txt" <<'EOF'
          Animal Crossing PC Port (macOS)

          1) Drag AnimalCrossing.app to Applications (optional).
          2) Put your disc image (.ciso/.iso/.gcm) in one of:
               ~/Documents/ACGC/
               ~/Documents/ACGC/rom/
          3) Optional runtime folders:
               ~/Documents/ACGC/save/
               ~/Documents/ACGC/texture_pack/
          4) Launch AnimalCrossing.app.

          Notes:
          - The app also checks ./rom/, ./save/, and ./texture_pack/ for terminal-based builds.
          - No asset extraction step is required.
          EOF

          hdiutil create \
            -volname "AnimalCrossing" \
            -srcfolder "${PKG_DIR}" \
            -ov \
            -format UDZO \
            "dist/AnimalCrossing-macos-${SHA_SHORT}.dmg"

          tar -czf "dist/AnimalCrossing-macos-${SHA_SHORT}.tar.gz" -C dist "AnimalCrossing-macos-${SHA_SHORT}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimalCrossing-macos-${{ github.sha }}
          path: |
            dist/AnimalCrossing-macos-*.dmg
            dist/AnimalCrossing-macos-*.tar.gz
          if-no-files-found: error

      - name: Publish rolling GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          retry() {
            local attempt=1
            local max_attempts=5
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "[release] command failed after ${max_attempts} attempts: $*" >&2
                return 1
              fi
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
          }

          RELEASE_TAG="master-latest"
          RELEASE_TITLE="master-latest"
          NOTES_FILE="dist/RELEASE_NOTES.md"

          cat > "${NOTES_FILE}" <<EOF
          Automated master build.

          - Commit: ${GITHUB_SHA}
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          if retry gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            retry gh release edit "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --prerelease \
              --notes-file "${NOTES_FILE}"
          else
            retry gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --prerelease \
              --notes-file "${NOTES_FILE}"
          fi

          ASSETS="$(retry gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          for asset in ${ASSETS}; do
            retry gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
          done

          retry gh release upload "${RELEASE_TAG}" dist/AnimalCrossing-macos-*.dmg dist/AnimalCrossing-macos-*.tar.gz
