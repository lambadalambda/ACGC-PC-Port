name: Build macOS Release DMG

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install cmake sdl2 make

      - name: Print toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          clang --version | head -n 2

      - name: Build
        run: make BUILD_DIR=pc/build-macos

      - name: Package release bundle
        run: |
          set -eu
          SHA_SHORT="${GITHUB_SHA::7}"
          PKG_DIR="dist/AnimalCrossing-macos-${SHA_SHORT}"
          mkdir -p "${PKG_DIR}" "dist"

          cp "pc/build-macos/bin/AnimalCrossing" "${PKG_DIR}/"
          cp -R "pc/build-macos/bin/shaders" "${PKG_DIR}/shaders"

          mkdir -p "${PKG_DIR}/rom" "${PKG_DIR}/save" "${PKG_DIR}/texture_pack"
          cp "README.md" "${PKG_DIR}/"

          cat > "${PKG_DIR}/ROM-LOCATION.txt" <<'EOF'
          Place your disc image (.ciso/.iso/.gcm) in one of these paths:
            - ./rom/                 (next to the binary)
            - ~/Documents/ACGC/
            - ~/Documents/ACGC/rom/
          EOF

          hdiutil create \
            -volname "AnimalCrossing" \
            -srcfolder "${PKG_DIR}" \
            -ov \
            -format UDZO \
            "dist/AnimalCrossing-macos-${SHA_SHORT}.dmg"

          tar -czf "dist/AnimalCrossing-macos-${SHA_SHORT}.tar.gz" -C dist "AnimalCrossing-macos-${SHA_SHORT}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnimalCrossing-macos-${{ github.sha }}
          path: |
            dist/AnimalCrossing-macos-*.dmg
            dist/AnimalCrossing-macos-*.tar.gz
          if-no-files-found: error
